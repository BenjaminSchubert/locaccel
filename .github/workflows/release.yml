name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  oci_image:
    name: oci
    uses: ./.github/workflows/oci.yml
    needs:
      - test
    with:
      publish: true
      tags: |
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=semver,pattern={{major}}
    permissions:
      id-token: write
      contents: read
      attestations: write
      packages: write

  package:
    uses: ./.github/workflows/package.yml
    permissions:
      contents: read

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - package
      - oci_image
      - test

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.ref_name }}

      - name: Extract git tag information
        run: |
          echo "GIT_TAG_BODY<<EOF" | tee --append $GITHUB_ENV
          echo "$(git tag -l --format='%(contents:body)' ${{ github.ref_name }})" | tee --append $GITHUB_ENV
          echo "EOF" | tee --append $GITHUB_ENV

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: locaccel-packages
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          body: ${{ env.GIT_TAG_BODY }}
          files: dist/*.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: true
